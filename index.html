<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Victron Configurator V4</title>

<style>
body{
  font-family:Arial;
  background:#eef2f7;
  padding:20px;
}

.card{
  background:#fff;
  padding:20px;
  border-radius:12px;
  margin-bottom:15px;
}

input,select{
  width:100%;
  padding:10px;
  margin-top:5px;
  border-radius:6px;
  border:1px solid #ccc;
}

button{
  padding:12px;
  margin-top:15px;
  background:#1976f3;
  color:#fff;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

h3{margin-top:20px}

.warning{color:red;font-weight:bold}
.ok{color:green;font-weight:bold}
</style>
</head>

<body>

<div class="card">
<h2>Configurazione Impianto</h2>

<label>Tensione sistema</label>
<select id="volt">
<option value="12">12V</option>
<option value="24" selected>24V</option>
<option value="48">48V</option>
</select>

<label>Potenza inverter richiesta (W)</label>
<input id="inv" type="number" value="1200">

<label>Batteria servizi (Ah)</label>
<input id="ah" type="number" value="100">

<label>Tipo batteria</label>
<select id="tipo">
<option value="agm">AGM</option>
<option value="gel">GEL</option>
<option value="litio">Litio</option>
</select>

<label>Ingresso banchina</label>
<select id="shore">
<option value="si">Si</option>
<option value="no">No</option>
</select>

<label>Generatore presente</label>
<select id="gen">
<option value="no">No</option>
<option value="si">Si</option>
</select>

<label>Monitoraggio richiesto</label>
<select id="monitor">
<option value="no">No</option>
<option value="si">Si</option>
</select>

<button onclick="calcola()">Genera impianto</button>
</div>

<div class="card" id="output"></div>

<script>

function calcola(){

let V = Number(document.getElementById("volt").value);
let W = Number(document.getElementById("inv").value);
let Ah = Number(document.getElementById("ah").value);
let tipo = document.getElementById("tipo").value;
let shore = document.getElementById("shore").value;
let gen = document.getElementById("gen").value;
let monitor = document.getElementById("monitor").value;

// Energia disponibile
let Wh = V * Ah;

// LOGICA IMPIANTO
let inverter="";
let charger="";
let note=[];
let warning=[];

// SCELTA TECNICA
if(gen=="si"){
    inverter="Victron Quattro";
    charger="Integrato";
    note.push("Sistema avanzato: doppio ingresso AC (banchina + generatore)");
}
else if(W <= 2000){
    inverter="Victron Phoenix";
    charger="Victron Blue Smart";
    note.push("Impianto base: inverter separato + caricatore");
}
else if(W <= 4000){
    inverter="Victron MultiPlus";
    charger="Integrato";
    note.push("Impianto intermedio: inverter/charger");
}
else{
    inverter="Victron MultiPlus alta potenza";
    charger="Integrato";
    warning.push("Attenzione: potenza elevata, verificare impianto");
}

// CONTROLLO BATTERIE
if(W > Wh){
    warning.push("⚠️ Batteria insufficiente per potenza richiesta");
}

// LITIO
if(tipo=="litio"){
    note.push("Necessario BMS per gestione batterie litio");
}

// MONITORAGGIO
let monitorTxt = (monitor=="si") 
    ? "Sistema GX attivo"
    : "Sistema base senza monitoraggio";

// PREVENTIVO
let prezzo = W * 0.6;
let iva = prezzo * 0.22;
let totale = prezzo + iva;

// COSTI INTERNI
let costo = prezzo * 0.7;
let margine = prezzo - costo;
let marginePerc = (margine/prezzo)*100;

// OUTPUT
document.getElementById("output").innerHTML = `

<h3>Configurazione tecnica</h3>
<b>Inverter:</b> ${inverter}<br>
<b>Caricatore:</b> ${charger}<br>
<b>Monitoraggio:</b> ${monitorTxt}

<h3>Note tecniche</h3>
${note.map(n=>"<div class='ok'>✔ "+n+"</div>").join("")}

<h3>Warning</h3>
${warning.length ? warning.map(w=>"<div class='warning'>"+w+"</div>").join("") : "Nessun problema rilevato"}

<h3>Preventivo cliente</h3>
Netto: €${prezzo.toFixed(2)}<br>
IVA 22%: €${iva.toFixed(2)}<br>
<b>Totale: €${totale.toFixed(2)}</b>

<h3>Analisi interna</h3>
Costo: €${costo.toFixed(2)}<br>
Margine: €${margine.toFixed(2)} (${marginePerc.toFixed(1)}%)

`;

}

</script>

</body>
</html>
