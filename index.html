<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Victron Configurator V3 Nautica</title>

<style>
body {font-family: Arial; background:#eef2f7; margin:0; padding:20px;}
.card {background:white; padding:15px; margin-bottom:15px; border-radius:12px;}
button {padding:10px; margin-top:10px; cursor:pointer;}
</style>
</head>

<body>

<h1>Victron Configurator V3</h1>

<div class="card">
<h3>Banchi Batteria</h3>
<div id="batteryBanks"></div>
<button onclick="addBattery()">Aggiungi banco</button>
</div>

<div class="card">
<button onclick="generate()">Genera configurazione</button>
</div>

<div class="card">
<h3>Output</h3>
<div id="output"></div>
</div>

<script>

let banks = [];

function addBattery() {
    let id = Date.now();
    banks.push(id);

    let container = document.getElementById("batteryBanks");

    let div = document.createElement("div");
    div.id = "bank_" + id;

    div.innerHTML = `
        <hr>
        Nome: <input id="name_${id}" value="Banco"><br>
        Tensione: <input id="volt_${id}" value="24"><br>
        Ah: <input id="ah_${id}" value="200"><br>
    `;

    container.appendChild(div);
}

function generate() {
    let text = "";

    banks.forEach(id => {
        let name = document.getElementById("name_"+id).value;
        let volt = document.getElementById("volt_"+id).value;
        let ah = document.getElementById("ah_"+id).value;

        text += `<p>${name} → ${volt}V ${ah}Ah</p>`;
    });

    document.getElementById("output").innerHTML = text;
}

</script>

</body>
</html>
