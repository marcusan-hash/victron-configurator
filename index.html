<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Victron Configurator V12.2.1</title>

<style>
body{
  font-family:Arial;
  background:#0a3768;
  color:#111;
  margin:0;
  padding:20px;
}

.card{
  background:#fff;
  padding:15px;
  margin-bottom:15px;
  border-radius:10px;
}

button{
  padding:10px;
  margin-top:10px;
  cursor:pointer;
}

.hidden{display:none;}

.route{
  border:1px solid #ccc;
  padding:10px;
  margin-bottom:10px;
}
</style>
</head>

<body>

<div class="card">
<h2>Configuratore Victron V12.2.1</h2>

<label>Tensione sistema</label>
<select id="systemVoltage">
<option value="12" selected>12V</option>
<option value="24">24V</option>
<option value="48">48V</option>
</select>

<label>Potenza inverter</label>
<input id="inverterPower" type="number" value="0">

<label>Ambiente</label>
<select id="env">
<option value="auto">Auto</option>
<option value="umido">Umido</option>
<option value="secco">Secco</option>
</select>

<button onclick="generate()">Genera configurazione</button>
</div>

<div id="result" class="card"></div>

<div id="cables" class="card hidden">
<h3>Distanze cablaggi</h3>
<div id="routes"></div>
<button onclick="calcCables()">Calcola cavi</button>
</div>

<script>

function generate(){

let v = Number(document.getElementById("systemVoltage").value);
let p = Number(document.getElementById("inverterPower").value);
let env = document.getElementById("env").value;

let result = [];

if(p <= 1200){
  result.push("Phoenix 1200");
}else if(p <= 3000){
  result.push("MultiPlus 3000");
}else{
  result.push("Quattro 5000");
}

if(env === "umido"){
  result.push("Blue Smart IP65");
}else{
  result.push("Blue Smart IP22");
}

result.push("SmartShunt");

document.getElementById("result").innerHTML =
"<b>Componenti:</b><br>" + result.join("<br>");

generateRoutes(p, v);
}

function generateRoutes(power, voltage){

let routes = [];

routes.push({
name:"Batterie → Inverter",
current: power/voltage,
distance:2
});

routes.push({
name:"Caricatore → Batterie",
current:20,
distance:2
});

let html = "";

routes.forEach((r,i)=>{
html += `
<div class="route">
<b>${r.name}</b><br>
Distanza: <input id="d_${i}" value="${r.distance}">
</div>
`;
});

document.getElementById("routes").innerHTML = html;
document.getElementById("cables").classList.remove("hidden");

window.routes = routes;
}

function calcCables(){

let voltage = Number(document.getElementById("systemVoltage").value);

let out = "<b>Sezioni cavi:</b><br>";

window.routes.forEach((r,i)=>{

let d = Number(document.getElementById("d_"+i).value);

let section = (2 * 0.0175 * d * r.current) / (voltage * 0.03);

out += r.name + " → " + Math.ceil(section) + " mm²<br>";

});

document.getElementById("result").innerHTML += "<br>" + out;
}

</script>

</body>
</html>
