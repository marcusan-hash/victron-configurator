<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Victron Configurator V10</title>

<style>

button{

<body>

<div>

</div>

<label>Potenza inverter richiesta (W)</label>

</div>

<div>
<label>Cliente</label>

</select>
</div>
</div>
</div>

<!-- ========================= -->
<!-- BLOCCO FOTOVOLTAICO -->
<!-- ========================= -->

<div class="card">
<h2>Pacco Fotovoltaico (CORRETTO)</h2>

<div class="grid grid-4">

<div>
<label>Numero pannelli</label>
<input id="pv_count" type="number" value="0">
</div>

<div>
<label>Potenza singolo pannello (W)</label>
<input id="pv_watt" type="number" value="0">
</div>

<div>
<label>Voc pannello (V)</label>
<input id="pv_voc" type="number" value="0">
</div>

<div>
<label>Vmpp pannello (V)</label>
<input id="pv_vmpp" type="number" value="0">
</div>

<div>
<label>Pannelli in serie</label>
<input id="pv_series" type="number" value="1">
</div>

<div>
<label>Pannelli in parallelo</label>
<input id="pv_parallel" type="number" value="1">
</div>

</div>

<div style="margin-top:10px;">

</div>

<!-- ========================= -->
<!-- BLOCCO LISTINO -->
<!-- ========================= -->

<div class="card">
<h2>Import listino</h2>

<input type="file" id="fileListino">

<button onclick="importListino()">Importa listino</button>

<div id="listinoStatus"></div>
</div>

<!-- ========================= -->
<!-- BLOCCO SCHEMA -->
<!-- ========================= -->

<div class="card">
<h2>Schema tecnico</h2>

<button onclick="generaSchema()">Genera schema</button>
<button onclick="exportPDF()">Esporta PDF</button>

<div id="schema" class="schema"></div>

</div>
<script>

function calcolaFV(){

  let count = Number(document.getElementById("pv_count").value);
  let watt = Number(document.getElementById("pv_watt").value);
  let voc = Number(document.getElementById("pv_voc").value);
  let vmpp = Number(document.getElementById("pv_vmpp").value);
  let serie = Number(document.getElementById("pv_series").value);
  let parallelo = Number(document.getElementById("pv_parallel").value);

  let totaleW = count * watt;

  let voc_tot = voc * serie;
  let corrente = (totaleW / vmpp);

  let mppt = "";

  if(voc_tot < 100){
    if(corrente < 30) mppt="100/30";
    else if(corrente < 50) mppt="100/50";
    else mppt="150/70";
  }
  else if(voc_tot < 150){
    mppt="150/70";
  }
  else{
    mppt="250/100";
  }

  document.getElementById("pv_result").innerHTML =
  "Totale FV: " + totaleW + "W<br>" +
  "Voc stringa: " + voc_tot + "V<br>" +
  "Corrente stimata: " + corrente.toFixed(1) + "A<br>" +
  "MPPT consigliato: <b>Victron " + mppt + "</b>";
}
  let LISTINO_IMPORTATO = {};
let PARAMETRI_CABLAGGI = [];

function importListino(){
  const fileInput = document.getElementById("fileListino");
  const file = fileInput.files && fileInput.files[0];

  if(!file){
    document.getElementById("listinoStatus").innerHTML = "Nessun file selezionato.";
    return;
  }

  const reader = new FileReader();
  reader.onload = function(e){
    try{
      const data = new Uint8Array(e.target.result);
      const workbook = XLSX.read(data, {type:"array"});
      const firstSheet = workbook.Sheets[workbook.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(firstSheet, {defval:""});

      LISTINO_IMPORTATO = {};

      rows.forEach(row=>{
        const keys = Object.keys(row).reduce((acc,k)=>{
          acc[k.toLowerCase()] = row[k];
          return acc;
        },{});

        const codice = String(keys["codice"] || keys["code"] || keys["sku"] || "").trim().toUpperCase();
        const descrizione = String(keys["descrizione"] || keys["description"] || "").trim();
        const costo = Number(keys["costo"] || keys["cost"] || keys["prezzo"] || 0);

        if(codice){
          LISTINO_IMPORTATO[codice] = {
            descrizione,
            costo
          };
        }
      });

      localStorage.setItem("victron_listino_v10", JSON.stringify(LISTINO_IMPORTATO));
      document.getElementById("listinoStatus").innerHTML =
        "Listino importato correttamente. Articoli letti: " + Object.keys(LISTINO_IMPORTATO).length;
    }catch(err){
      console.error(err);
      document.getElementById("listinoStatus").innerHTML = "Errore nella lettura del file listino.";
    }
  };

  reader.readAsArrayBuffer(file);
}

function getPrezzoDaListino(codice, fallback=0){
  const key = String(codice || "").trim().toUpperCase();
  if(LISTINO_IMPORTATO[key] && Number(LISTINO_IMPORTATO[key].costo) > 0){
    return Number(LISTINO_IMPORTATO[key].costo);
  }
  return fallback;
}

function tipoImpianto(){
  const inverterPower = Number(document.getElementById("inverterPower").value || 0);
  const pvCount = Number(document.getElementById("pv_count").value || 0);

  if(inverterPower <= 1500 && pvCount === 0){
    return "base";
  }

  if(inverterPower <= 3000){
    return "medio";
  }

  return "avanzato";
}

function resetCablaggi(){
  PARAMETRI_CABLAGGI = [];
}

function aggiungiParametroCablaggio(id, label, tipo="number", valore=1){
  PARAMETRI_CABLAGGI.push({
    id,
    label,
    tipo,
    valore
  });
}

function costruisciParametriCablaggio(){
  resetCablaggi();

  const tipo = tipoImpianto();
  const inverterPower = Number(document.getElementById("inverterPower").value || 0);
  const pvCount = Number(document.getElementById("pv_count").value || 0);

  if(inverterPower > 0){
    aggiungiParametroCablaggio("cab_dist_batt_inv_pos", "Distanza batteria → inverter (positivo, m)");
    aggiungiParametroCablaggio("cab_dist_batt_inv_neg", "Distanza batteria → inverter (negativo, m)");
  }

  aggiungiParametroCablaggio("cab_dist_ac_banchina_carica", "Distanza linea AC → caricatore / inverter-charger (m)");

  if(tipo === "base" || tipo === "medio" || tipo === "avanzato"){
    aggiungiParametroCablaggio("cab_dist_carica_banco_servizi_pos", "Distanza caricatore → banco servizi (positivo, m)");
    aggiungiParametroCablaggio("cab_dist_carica_banco_servizi_neg", "Distanza caricatore → banco servizi (negativo, m)");
  }

  aggiungiParametroCablaggio("cab_dist_alt_splitter", "Distanza alternatore → ripartitore / Argofet / Argodiode (m)");
  aggiungiParametroCablaggio("cab_dist_splitter_banchi", "Distanza ripartitore → batterie (m)");

  if(pvCount > 0){
    aggiungiParametroCablaggio("cab_dist_mppt_banco_pos", "Distanza MPPT → banco servizi (positivo, m)");
    aggiungiParametroCablaggio("cab_dist_mppt_banco_neg", "Distanza MPPT → banco servizi (negativo, m)");
    aggiungiParametroCablaggio("cab_dist_pannelli_mppt", "Distanza campo FV → MPPT (m)");
  }

  aggiungiParametroCablaggio("cab_has_shunt", "Presenza SmartShunt sul negativo", "select", "si");
}

function renderParametriCablaggio(){
  costruisciParametriCablaggio();

  let html = `
    <div class="card">
      <h2>Parametri cablaggi dinamici</h2>
      <div class="grid grid-3">
  `;

  PARAMETRI_CABLAGGI.forEach(p=>{
    if(p.tipo === "select"){
      html += `
        <div>
          <label>${p.label}</label>
          <select id="${p.id}">
            <option value="si" ${p.valore==="si" ? "selected" : ""}>Sì</option>
            <option value="no" ${p.valore==="no" ? "selected" : ""}>No</option>
          </select>
        </div>
      `;
    }else{
      html += `
        <div>
          <label>${p.label}</label>
          <input id="${p.id}" type="number" value="${p.valore}">
        </div>
      `;
    }
  });

  html += `
      </div>
    </div>
  `;

  const schemaCard = document.getElementById("schema").parentElement;
  const old = document.getElementById("dynamicCableBlock");
  if(old) old.remove();

  const wrapper = document.createElement("div");
  wrapper.id = "dynamicCableBlock";
  wrapper.innerHTML = html;

  schemaCard.parentElement.insertBefore(wrapper, schemaCard);
}

function leggiParametro(id, fallback=0){
  const el = document.getElementById(id);
  if(!el) return fallback;
  if(el.tagName === "SELECT") return el.value;
  return Number(el.value || fallback);
}

function sezioneStandard(val){
  const sezioni = [1.5, 2.5, 4, 6, 10, 16, 25, 35, 50, 70, 95, 120];
  return sezioni.find(s => s >= val) || 120;
}

function calcolaSezioneDC(corrente, distanzaAndata, distanzaRitorno, tensione, cadutaPercentuale=3){
  if(corrente <= 0 || tensione <= 0) return 1.5;

  const rho = 0.0175;
  const lunghezzaTotale = distanzaAndata + distanzaRitorno;
  const cadutaVolt = tensione * (cadutaPercentuale / 100);

  const sezione = (2 * rho * lunghezzaTotale * corrente) / cadutaVolt;
  return sezioneStandard(sezione);
}

function correnteDaPotenzaDC(potenzaW, tensioneV, efficienza=0.9){
  if(!potenzaW || !tensioneV) return 0;
  return potenzaW / (tensioneV * efficienza);
}

function mpptScelto(){
  const text = document.getElementById("pv_result").innerText || "";
  const match = text.match(/Victron\s+([0-9]+\/[0-9]+)/i);
  return match ? match[1] : "";
}

function cablaggiConsigliati(){
  const tensione = Number(document.getElementById("systemVoltage").value || 12);
  const inverterPower = Number(document.getElementById("inverterPower").value || 0);
  const pvCount = Number(document.getElementById("pv_count").value || 0);
  const hasShunt = leggiParametro("cab_has_shunt", "si");

  const righe = [];

  if(inverterPower > 0){
    const correnteInv = correnteDaPotenzaDC(inverterPower, tensione, 0.9);
    const dPos = leggiParametro("cab_dist_batt_inv_pos", 1);
    const dNeg = leggiParametro("cab_dist_batt_inv_neg", 1);
    const sezione = calcolaSezioneDC(correnteInv, dPos, dNeg, tensione, 3);

    righe.push({
      tratta: "Banco batterie ↔ Inverter",
      tipo: "DC potenza",
      colore: "Rosso / Nero",
      sezione: sezione + " mm²",
      nota: hasShunt === "si"
        ? "Sezione negativa da mantenere coerente con il ramo SmartShunt."
        : "Positivo e negativo da mantenere equivalenti."
    });
  }

  const dAc = leggiParametro("cab_dist_ac_banchina_carica", 1);
  righe.push({
    tratta: "Linea AC banchina ↔ caricatore / inverter-charger",
    tipo: "AC",
    colore: "Marrone / Blu / Giallo-Verde",
    sezione: "da definire per corrente AC e norme impianto",
    nota: "Valutare protezione magnetotermica e differenziale."
  });

  const dCarPos = leggiParametro("cab_dist_carica_banco_servizi_pos", 1);
  const dCarNeg = leggiParametro("cab_dist_carica_banco_servizi_neg", 1);
  const correnteCaricaStimata = 20;
  const sezioneCarica = calcolaSezioneDC(correnteCaricaStimata, dCarPos, dCarNeg, tensione, 3);

  righe.push({
    tratta: "Caricatore ↔ banco servizi",
    tipo: "DC carica",
    colore: "Rosso / Nero",
    sezione: sezioneCarica + " mm²",
    nota: "Dimensionare in base alla corrente reale del caricatore selezionato."
  });

  const dAlt = leggiParametro("cab_dist_alt_splitter", 1);
  const dSplit = leggiParametro("cab_dist_splitter_banchi", 1);

  righe.push({
    tratta: "Alternatore ↔ ripartitore di carica",
    tipo: "DC carica",
    colore: "Rosso / Nero",
    sezione: "da calcolare sugli ampere reali alternatore",
    nota: "Valutare Argofet / Argodiode in base alla configurazione."
  });

  righe.push({
    tratta: "Ripartitore ↔ batterie",
    tipo: "DC carica",
    colore: "Rosso / Nero",
    sezione: "da calcolare sui rami effettivi",
    nota: "Ogni banco va considerato singolarmente."
  });

  if(pvCount > 0){
    const vmpp = Number(document.getElementById("pv_vmpp").value || 0);
    const watt = Number(document.getElementById("pv_watt").value || 0);
    const count = Number(document.getElementById("pv_count").value || 0);

    const potenzaTot = watt * count;
    const correnteFV = vmpp > 0 ? potenzaTot / vmpp : 0;

    const dPvPos = leggiParametro("cab_dist_mppt_banco_pos", 1);
    const dPvNeg = leggiParametro("cab_dist_mppt_banco_neg", 1);
    const sezionePV = calcolaSezioneDC(correnteFV, dPvPos, dPvNeg, tensione, 3);

    righe.push({
      tratta: "MPPT ↔ banco servizi",
      tipo: "DC solare",
      colore: "Rosso / Nero",
      sezione: sezionePV + " mm²",
      nota: "Regolatore consigliato: " + (mpptScelto() || "da calcolare")
    });

    righe.push({
      tratta: "Campo FV ↔ MPPT",
      tipo: "DC FV",
      colore: "Rosso / Nero",
      sezione: "da definire su corrente stringa e Voc",
      nota: "Basare il cablaggio su configurazione serie/parallelo dei pannelli."
    });
  }

  return righe;
}

function renderCablaggi(){
  const righe = cablaggiConsigliati();

  let html = `
    <table border="1" cellpadding="6" cellspacing="0" width="100%">
      <tr>
        <th>Tratta</th>
        <th>Tipo</th>
        <th>Colore cavo</th>
        <th>Sezione consigliata</th>
        <th>Note</th>
      </tr>
  `;

  righe.forEach(r=>{
    html += `
      <tr>
        <td>${r.tratta}</td>
        <td>${r.tipo}</td>
        <td>${r.colore}</td>
        <td>${r.sezione}</td>
        <td>${r.nota}</td>
      </tr>
    `;
  });

  html += `</table>`;
  return html;
}
  function costoProgettazioneVendita(){
  const ore = Number(document.getElementById("designHours")?.value || 0);
  const prezzoOrarioVendita = Number(document.getElementById("designSell")?.value || 0);
  return ore * prezzoOrarioVendita;
}

function costoProgettazioneInterno(){
  const ore = Number(document.getElementById("designHours")?.value || 0);
  const costoOrarioInterno = Number(document.getElementById("designHourlyCost")?.value || 0);
  return ore * costoOrarioInterno;
}

function totaleTrasportoVendita(){
  return Number(document.getElementById("shipSell")?.value || 0);
}

function totaleTrasportoInterno(){
  return Number(document.getElementById("shipCost")?.value || 0);
}

function inverterConsigliato(){
  const tensione = Number(document.getElementById("systemVoltage").value || 24);
  const potenza = Number(document.getElementById("inverterPower").value || 0);

  if(potenza <= 1200){
    return tensione === 12 ? "Phoenix 12/1200" :
           tensione === 24 ? "Phoenix 24/1200" :
           "Phoenix 48/1200";
  }

  if(potenza <= 3000){
    return tensione === 12 ? "Phoenix 12/3000" :
           tensione === 24 ? "Phoenix 24/3000" :
           "Phoenix 48/3000";
  }

  if(potenza <= 5000){
    return tensione === 24 ? "MultiPlus-II 24/5000" : "MultiPlus-II 48/5000";
  }

  return tensione === 24 ? "Quattro 24/8000" : "Quattro 48/8000";
}

function caricatoreConsigliato(){
  const tensione = Number(document.getElementById("systemVoltage").value || 24);
  const impianto = tipoImpianto();

  if(impianto === "base"){
    return tensione === 12 ? "Blue Smart IP22 12/20" : "Blue Smart IP22 24/16";
  }

  if(impianto === "medio"){
    return tensione === 12 ? "Smart IP43 12/30" : "Smart IP43 24/25";
  }

  return tensione === 24 ? "Skylla-IP44 24/80" : "Caricatore da definire";
}

function generaReportTecnico(){
  const tensione = Number(document.getElementById("systemVoltage").value || 24);
  const inverter = inverterConsigliato();
  const charger = caricatoreConsigliato();
  const pvText = document.getElementById("pv_result").innerHTML || "Nessun campo FV definito.";
  const tipo = tipoImpianto();

  return `
    <div class="card">
      <h2>Relazione tecnica</h2>

      <p><b>Tipologia impianto:</b> ${tipo}</p>
      <p><b>Tensione impianto:</b> ${tensione}V</p>
      <p><b>Inverter consigliato:</b> ${inverter}</p>
      <p><b>Caricatore consigliato:</b> ${charger}</p>

      <h3>Sezione fotovoltaica</h3>
      <div>${pvText}</div>

      <h3>Note tecniche</h3>
      <ul>
        <li>Il dimensionamento dei cavi DC deve essere verificato sulla base delle tratte reali e della caduta di tensione ammessa.</li>
        <li>La linea positiva e negativa devono essere considerate in modo coerente, soprattutto in presenza di SmartShunt sul negativo.</li>
        <li>Le linee dati devono rispettare la tipologia Victron: VE.Direct, VE.Bus, VE.Can secondo i componenti realmente presenti.</li>
        <li>Il regolatore MPPT va selezionato in funzione di Voc, Vmpp, numero pannelli, configurazione serie/parallelo e tensione banco batterie.</li>
      </ul>
    </div>
  `;
}

function schemaBlocchi(){
  const inverter = inverterConsigliato();
  const charger = caricatoreConsigliato();
  const fv = document.getElementById("pv_count").value || 0;

  let html = `
    <div style="padding:15px;background:#f7fbff;border-radius:12px;">
      <h3>Schema a blocchi impianto tecnico</h3>
      <div style="display:flex;flex-wrap:wrap;gap:12px;align-items:center;">
        <div class="asset-card">Banchina AC</div>
        <div>→</div>
        <div class="asset-card">${charger}</div>
        <div>→</div>
        <div class="asset-card">Banco batterie</div>
        <div>→</div>
        <div class="asset-card">${inverter}</div>
      </div>
  `;

  if(Number(fv) > 0){
    html += `
      <div style="display:flex;flex-wrap:wrap;gap:12px;align-items:center;margin-top:15px;">
        <div class="asset-card">Campo FV</div>
        <div>→</div>
        <div class="asset-card">${mpptScelto() || "MPPT"}</div>
        <div>→</div>
        <div class="asset-card">Banco batterie</div>
      </div>
    `;
  }

  html += `</div>`;
  return html;
}

        <line x1="840" y1="270" x2="900" y2="100" stroke="red" stroke-width="4"></line>
        <text x="880" y="180" font-size="12" fill="red">+ DC</text>

        <line x1="840" y1="290" x2="900" y2="120" stroke="black" stroke-width="4"></line>
        <text x="890" y="215" font-size="12" fill="black">- DC</text>

        ${mppt ? `
        <line x1="240" y1="470" x2="320" y2="470" stroke="red" stroke-width="4"></line>
        <line x1="540" y1="470" x2="620" y2="270" stroke="red" stroke-width="4"></line>
        <line x1="540" y1="490" x2="620" y2="290" stroke="black" stroke-width="4"></line>
        <text x="580" y="395" font-size="12" fill="red">DC FV</text>
        ` : ''}
      </svg>

      <div style="margin-top:12px;">
        <b>Legenda cablaggi:</b><br>
        <span style="color:red;">Rosso</span> = positivo DC,
        <span style="color:black;">Nero</span> = negativo DC,
        <span style="color:#1e88e5;">Blu</span> = linea AC / dati VE.Direct,
        <span style="color:green;">Verde</span> = VE.Bus / comunicazione dedicata.
      </div>
    </div>
  `;

  if(righe.length){
    html += `
      <div class="card">
        <h3>Sezioni riportate lungo i cablaggi</h3>
        ${renderCablaggi()}
      </div>
    `;
  }

  return html;
}

function generaSchema(){
  renderParametriCablaggio();

  const html = `
    ${schemaBlocchi()}
    <div style="height:15px;"></div>
    ${schemaTecnicoCablato()}
    <div style="height:15px;"></div>
    ${generaReportTecnico()}
  `;

  document.getElementById("schema").innerHTML = html;
}

function exportPDF(){
  const contenuto = document.getElementById("schema").innerHTML;
  const win = window.open("", "_blank");
  win.document.write(`
    <html>
      <head>
        <title>Schema Tecnico PDF</title>
        <style>
          body{font-family:Arial;padding:20px;}
        </style>
      </head>
      <body>
        ${contenuto}
      </body>
    </html>
  `);
  win.document.close();
  win.print();
}

window.onload = function(){
  const raw = localStorage.getItem("victron_listino_v10");
  if(raw){
    try{
      LISTINO_IMPORTATO = JSON.parse(raw);
      document.getElementById("listinoStatus").innerHTML =
        "Listino caricato da memoria. Articoli: " + Object.keys(LISTINO_IMPORTATO).length;
    }catch(e){}
  }
};
