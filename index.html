<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>V15.2 Configuratore Victron COMPLETE</title>

<style>
body{font-family:Arial;background:#f4f6f8;margin:0}
header{background:#003b5c;color:#fff;padding:20px;text-align:center}
main{max-width:1100px;margin:20px auto;padding:10px}
.card{background:#fff;padding:20px;margin-bottom:15px;border-radius:10px}
select,input{width:100%;padding:10px;margin-top:5px}
button{padding:10px 15px;margin-top:10px;border:0;border-radius:6px;background:#0077b6;color:#fff;cursor:pointer}
.item{border:1px solid #ccc;padding:10px;margin-top:10px;border-radius:6px}
.info{color:#555;font-size:14px;margin-top:5px}
.final{background:#eef2ff;padding:10px;border-left:4px solid #4f46e5;margin-top:10px}
</style>

</head>

<body>

<header>
<h1>Configuratore Victron V15.2</h1>
</header>

<main>

<div class="card">
<h2>Configurazione base</h2>

<label>Modalità</label>
<select id="mode">
<option value="new">Nuovo impianto</option>
<option value="existing">Impianto esistente</option>
</select>

<label>Tensione banco servizi</label>
<select id="voltage">
<option value="12">12V</option>
<option value="24">24V</option>
<option value="48">48V</option>
</select>

<label>Potenza inverter richiesta</label>
<select id="power">
<option value="0">Nessuna</option>
<option value="1000">1000W</option>
<option value="2000">2000W</option>
<option value="3000">3000W</option>
</select>

<label>Alternatore presente</label>
<select id="alternator">
<option value="false">No</option>
<option value="true">Sì</option>
</select>

<label>Solare presente</label>
<select id="solar">
<option value="false">No</option>
<option value="true">Sì</option>
</select>

<button onclick="run()">Configura</button>

</div>

<div class="card">
<h2>Lista impianto</h2>
<div id="impianto"></div>
</div>

<div class="card">
<h2>Preventivo cliente</h2>
<div id="cliente"></div>
</div>

<div class="card">
<h2>Lista interna</h2>
<div id="interno"></div>
</div>

<div class="card">
<h2>Schema a blocchi</h2>
<div id="schema"></div>
</div>

</main>

<script>

// ===== CATALOGO BASE VICRON =====
const catalog = {
inverter:[
{ id:"inv1", name:"Phoenix 12/1200", v:12, p:1200, price:600, info:"Inverter base" },
{ id:"inv2", name:"Phoenix 24/3000", v:24, p:3000, price:1200, info:"Inverter alta potenza" }
],
multiplus:[
{ id:"mp1", name:"MultiPlus 12/2000", v:12, p:2000, price:1500, info:"Inverter + caricatore" },
{ id:"mp2", name:"MultiPlus 24/3000", v:24, p:3000, price:2200, info:"Sistema completo AC" }
],
mppt:[
{ id:"mppt1", name:"SmartSolar 100/30", price:300, info:"Regolatore solare" }
],
dcdc:[
{ id:"orion", name:"Orion-Tr Smart 12/24", price:250, info:"Carica da alternatore" }
],
monitor:[
{ id:"shunt", name:"SmartShunt", price:150, info:"Monitor batterie" }
]
};

// ===== MOTORE =====
function run(){

let voltage=parseInt(val("voltage"));
let power=parseInt(val("power"));
let alternator=val("alternator")==="true";
let solar=val("solar")==="true";

let impianto=[];
let cliente=[];
let interno=[];

// INVERTER
if(power>0){
let inv=catalog.multiplus.find(x=>x.v===voltage && x.p>=power);
if(!inv) inv=catalog.inverter.find(x=>x.v===voltage);

add(inv);
}

// ALTERNATORE
if(alternator){
add(catalog.dcdc[0]);
}

// SOLARE
if(solar){
add(catalog.mppt[0]);
}

// MONITOR SEMPRE
add(catalog.monitor[0]);

function add(p){
impianto.push(p);
cliente.push({name:p.name,price:p.price});
interno.push({name:p.name,note:p.info});
}

// ===== OUTPUT =====
renderImpianto(impianto);
renderCliente(cliente);
renderInterno(interno);
renderSchema(impianto);

}

// ===== UI =====
function renderImpianto(list){
let html="";
list.forEach(p=>{
html+=`
<div class="item">
<strong>${p.name}</strong>
<button onclick="alert('${p.info}')">i</button>
<div class="info">${p.info}</div>
</div>`;
});
document.getElementById("impianto").innerHTML=html;
}

function renderCliente(list){
let tot=0;
let html="<ul>";
list.forEach(p=>{
tot+=p.price;
html+=`<li>${p.name} - €${p.price}</li>`;
});
html+=`</ul><strong>TOTALE: €${tot}</strong>`;
document.getElementById("cliente").innerHTML=html;
}

function renderInterno(list){
let html="<ul>";
list.forEach(p=>{
html+=`<li>${p.name} → ${p.note}</li>`;
});
html+="</ul>";
document.getElementById("interno").innerHTML=html;
}

function renderSchema(list){
let html="Batteria → ";
list.forEach(p=>{
html+=`→ ${p.name} `;
});
document.getElementById("schema").innerHTML="<div class='final'>"+html+"</div>";
}

function val(id){return document.getElementById(id).value}

</script>

</body>
</html>
