<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Victron Configurator V11</title>

<style>
body{
  font-family:Arial;
  background:linear-gradient(135deg,#0b2a4a,#004d87);
  margin:0;
  color:#fff;
}

.container{
  max-width:1200px;
  margin:auto;
  padding:20px;
}

.card{
  background:#fff;
  color:#000;
  border-radius:16px;
  padding:16px;
  margin-bottom:16px;
}

h2{color:#004d87;margin-top:0;}

.row{display:flex;gap:10px;flex-wrap:wrap;}
.col{flex:1;min-width:150px;}

input,select{
  width:100%;
  padding:8px;
  border-radius:8px;
  border:1px solid #ccc;
}

button{
  padding:10px;
  border:none;
  border-radius:10px;
  background:#00a3e0;
  color:#fff;
  cursor:pointer;
  font-weight:bold;
}

button:hover{background:#007bb5;}

.hidden{display:none;}
.badge{padding:5px 10px;border-radius:6px;font-size:12px;}
.green{background:#c8e6c9;}
.yellow{background:#fff3cd;}

</style>
</head>

<body>
<div class="container">

<h1>⚡ Victron Configurator V11</h1>

<!-- DATI -->
<div class="card">
<h2>Dati Impianto</h2>

<div class="row">
<div class="col">
<label>Potenza inverter</label>
<input id="invPower" type="number">
</div>

<div class="col">
<label>Tensione</label>
<select id="systemVolt">
<option>12</option>
<option selected>24</option>
<option>48</option>
</select>
</div>
</div>
</div>

<!-- BATTERIE -->
<div class="card">
<h2>Batterie</h2>
<button onclick="addBattery()">+ Banco</button>
<div id="batteries"></div>
</div>

<!-- FV -->
<div class="card">
<h2>Fotovoltaico</h2>

<label><input type="checkbox" id="pvOn" onchange="togglePV()"> Attivo</label>

<div id="pvBlock" class="hidden">

<div class="row">
<div class="col">
<label>Pannelli</label>
<input id="pvNum" value="1" type="number" onchange="checkPV()">
</div>

<div class="col">
<label>W pannello</label>
<input id="pvPower" type="number">
</div>

<div class="col">
<label>Voc</label>
<input id="pvVoc" type="number">
</div>
</div>

<div class="row" id="pvSeries">
<div class="col">
<label>Serie</label>
<input id="pvS" value="1">
</div>
<div class="col">
<label>Parallelo</label>
<input id="pvP" value="1">
</div>
</div>

</div>
</div>

<!-- GENERATORI -->
<div class="card">
<h2>Generatori</h2>
<button onclick="addGen()">+ Generatore</button>
<div id="gens"></div>
</div>

<!-- GENERA -->
<div class="card">
<button onclick="generate()">⚡ Genera Configurazione</button>
</div>

<!-- OUTPUT -->
<div class="card">
<h2>Output</h2>
<div id="output">---</div>
</div>

</div>

<script>

// -------- UTILS --------
function val(id){return document.getElementById(id).value}
function num(id){return Number(val(id))||0}

// -------- BATTERIE --------
function addBattery(){
  const d=document.createElement("div")
  d.className="row"
  d.innerHTML=`
    <div class="col"><input placeholder="Ah" class="ah"></div>
    <div class="col"><input placeholder="Volt" value="12" class="volt"></div>
  `
  document.getElementById("batteries").appendChild(d)
}

// -------- FV --------
function togglePV(){
  document.getElementById("pvBlock").classList.toggle("hidden")
}

function checkPV(){
  let n=num("pvNum")
  document.getElementById("pvSeries").style.display=(n>1?"flex":"none")
}

// -------- GENERATORI --------
function addGen(){
  const d=document.createElement("div")
  d.className="row"
  d.innerHTML=`
    <div class="col"><input placeholder="kW" class="kw"></div>
  `
  document.getElementById("gens").appendChild(d)
}

// -------- GENERA --------
function generate(){

  let out=""

  // batterie
  let bats=document.querySelectorAll("#batteries .row")
  bats.forEach(b=>{
    let ah=b.querySelector(".ah").value
    let v=b.querySelector(".volt").value
    out+=`🔋 ${v}V ${ah}Ah<br>`
  })

  // FV
  if(document.getElementById("pvOn").checked){
    let p=num("pvPower")
    let n=num("pvNum")
    let voc=num("pvVoc")
    let s=num("pvS")||1

    out+=`☀️ FV ${p*n}W Voc ${voc*s}<br>`
  }

  // generatori
  let gens=document.querySelectorAll("#gens .row")
  gens.forEach(g=>{
    let kw=g.querySelector(".kw").value
    out+=`⚙️ Generatore ${kw}kW<br>`
  })

  // inverter
  let inv=num("invPower")
  let volt=val("systemVolt")

  out+=`<br><b>Inverter ${inv}W ${volt}V</b>`

  document.getElementById("output").innerHTML=out
}

</script>

</body>
</html>
