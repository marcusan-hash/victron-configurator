<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Victron Configurator V7.1</title>

<style>
body{
  font-family:Arial;
  background:#eef4fa;
  margin:0;
  padding:20px;
}

h1{
  background:#0067b8;
  color:white;
  padding:15px;
  border-radius:10px;
}

.card{
  background:white;
  padding:15px;
  margin-bottom:15px;
  border-radius:10px;
}

button{
  padding:10px;
  background:#0067b8;
  color:white;
  border:none;
  border-radius:6px;
  cursor:pointer;
}

input,select{
  padding:8px;
  width:100%;
  margin-bottom:10px;
}

/* SCHEMA V7.1 */
.schema{
  background:white;
  padding:20px;
  border-radius:10px;
}

.row{
  display:flex;
  align-items:center;
  margin-bottom:20px;
}

.box{
  border:2px solid #ccc;
  padding:15px;
  border-radius:10px;
  text-align:center;
  min-width:180px;
}

.arrow{
  margin:0 10px;
  font-size:20px;
}
</style>
</head>
<body>

<h1>Victron Configurator V7.1</h1>

<div class="card">
<label>Potenza inverter (W)</label>
<input id="power" value="1200">

<label>Tensione impianto</label>
<select id="volt">
<option>12</option>
<option selected>24</option>
<option>48</option>
</select>

<button onclick="calcola()">Genera</button>
</div>

<div class="card" id="risultato"></div>

<div class="schema" id="schema"></div>
er<script>

function calcola(){

let power = parseInt(document.getElementById("power").value)
let volt = parseInt(document.getElementById("volt").value)

let inverter = ""
let charger = ""
let note = ""

if(power <= 1200){
  inverter = "Phoenix 1200"
}else if(power <= 3000){
  inverter = "Phoenix 3000"
}else{
  inverter = "Multiplus"
}

let corrente = power / volt

if(corrente < 15){
  charger = "Blue Smart 15A"
}else if(corrente < 25){
  charger = "Blue Smart 20A"
}else{
  charger = "Blue Smart 30A"
}

if(power > 4000){
  note = "⚠ Attenzione: banco batterie sottodimensionato"
}

document.getElementById("risultato").innerHTML = `
<b>Inverter:</b> ${inverter}<br>
<b>Caricatore:</b> ${charger}<br>
${note}
`

generaSchema(inverter, charger)
}

function generaSchema(inverter, charger){
  let html = `
<div class="row">
<div class="box">Banchina</div>
<div class="arrow">→</div>
<div class="box">${inverter}</div>
<div class="arrow">→</div>
<div class="box">Utenze AC</div>
</div>

<div class="row">
<div class="box">${charger}</div>
<div class="arrow">↓</div>
<div class="box">Batterie</div>
</div>

<div class="row">
<div class="box">Alternatore</div>
<div class="arrow">→</div>
<div class="box">Batterie</div>
</div>
`

document.getElementById("schema").innerHTML = html
}

</script>

</body>
</html>
