<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Victron Configurator V3 CORE</title>

<style>
body {
  font-family:-apple-system;
  background:#eef2f7;
  margin:0;
  padding:20px;
}
.container {max-width:900px;margin:auto;}
.card {
  background:white;
  padding:20px;
  margin-bottom:15px;
  border-radius:14px;
}
input,select {
  width:100%;
  padding:10px;
  margin-bottom:10px;
  border-radius:10px;
}
button {
  padding:12px;
  background:#1976f3;
  color:white;
  border:none;
  border-radius:10px;
}
.row {display:grid;grid-template-columns:1fr 1fr;gap:10px;}
</style>
</head>

<body>
<div class="container">

<h1>Victron Configurator V3</h1>

<div class="card">
<h3>Impianto</h3>
<select id="systemV">
<option>12</option>
<option selected>24</option>
<option>48</option>
</select>

<input id="power" value="8000" placeholder="VA richiesti">
</div>

<div class="card">
<h3>Batterie</h3>
<div id="banks"></div>
<button onclick="addBank()">+ Banco</button>
</div>

<div class="card">
<h3>Utenze DC</h3>
<div id="loads"></div>
<button onclick="addLoad()">+ Utenza</button>
</div>

<div class="card">
<button onclick="run()">GENERA</button>
</div>

<div class="card">
<h3>Risultato</h3>
<div id="out"></div>
</div>

</div>

<script>

let banks=[],loads=[];

function addBank(){
 let id=Date.now();
 banks.push(id);
 document.getElementById("banks").innerHTML+=`
 <div id="b_${id}">
 <hr>
 <input id="type_${id}" placeholder="Tipo (esistente/nuovo)">
 <div class="row">
 <input id="v_${id}" value="12">
 <input id="ah_${id}" value="100">
 </div>
 <div class="row">
 <input id="s_${id}" value="2">
 <input id="p_${id}" value="2">
 </div>
 </div>`;
}

function addLoad(){
 let id=Date.now();
 loads.push(id);
 document.getElementById("loads").innerHTML+=`
 <div id="l_${id}">
 <hr>
 <input id="lv_${id}" value="12">
 <input id="lw_${id}" value="100">
 </div>`;
}

function run(){

 let sys=Number(document.getElementById("systemV").value);
 let pwr=Number(document.getElementById("power").value);

 let txt="";

 // inverter logico
 let inverter="";
 if(pwr>=8000) inverter="Quattro 8000";
 else inverter="MultiPlus 5000";

 txt+="<b>Inverter:</b> "+inverter+"<br><br>";

 // batterie
 banks.forEach(id=>{
   let v=Number(document.getElementById("v_"+id).value);
   let ah=Number(document.getElementById("ah_"+id).value);
   let s=Number(document.getElementById("s_"+id).value);
   let p=Number(document.getElementById("p_"+id).value);

   let totV=v*s;
   let totAh=ah*p;

   txt+="Banco: "+totV+"V "+totAh+"Ah<br>";
 });

 // utenze DC
 loads.forEach(id=>{
   let v=Number(document.getElementById("lv_"+id).value);

   if(v!=sys){
     txt+="Serve Orion "+sys+"→"+v+"<br>";
   }
 });

 document.getElementById("out").innerHTML=txt;
}

</script>
</body>
</html>
