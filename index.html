<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Victron Configurator V7</title>

<style>
body {
  font-family: Arial;
  background:#f4f8fb;
  margin:20px;
}
h1 {color:#0067b8;}

.card {
  background:white;
  padding:15px;
  margin-bottom:15px;
  border-radius:10px;
  box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

button {
  padding:10px;
  border:none;
  border-radius:8px;
  background:#0067b8;
  color:white;
  cursor:pointer;
}

input, select {
  padding:8px;
  width:100%;
  margin-bottom:8px;
}

.row {display:flex; gap:10px;}
.col {flex:1;}

.schema {
  border:2px dashed #0067b8;
  padding:20px;
  border-radius:10px;
  background:white;
}
.node {
  padding:10px;
  border:2px solid #0067b8;
  border-radius:8px;
  margin:5px;
  display:inline-block;
}
</style>
</head>

<body>

<h1>Victron Configurator V7</h1>

<div class="card">
<h2>Configurazione</h2>

<label>Potenza inverter (W)</label>
<input id="inverterPower" value="1200">

<label>Tensione impianto</label>
<select id="systemVoltage">
<option>12</option>
<option selected>24</option>
<option>48</option>
</select>

<label>Banchina AC</label>
<input type="checkbox" id="shore" checked>

</div>

<div class="card">
<h2>Banchi batteria</h2>
<div id="batteries"></div>
<button onclick="addBattery()">Aggiungi banco</button>
</div>

<div class="card">
<h2>Utenze DC</h2>
<div id="loads"></div>
<button onclick="addLoad()">Aggiungi utenza</button>
</div>

<div class="card">
<button onclick="generate()">Genera impianto</button>
</div>

<div class="card">
<h2>Risultato</h2>
<div id="result"></div>
</div>

<div class="card">
<h2>Schema impianto</h2>
<div id="schema" class="schema"></div>
</div>

<script>

let batteries = [];
let loads = [];

function addBattery(){
  let id = Date.now();

  batteries.push(id);

  document.getElementById("batteries").innerHTML += `
  <div id="bat_${id}">
    <div class="row">
      <div class="col">
        <label>Tipo</label>
        <select id="type_${id}">
          <option>agm</option>
          <option>gel</option>
          <option>lithium</option>
        </select>
      </div>

      <div class="col">
        <label>Ah</label>
        <input id="ah_${id}" value="100">
      </div>

      <div class="col">
        <label>Volt</label>
        <input id="volt_${id}" value="12">
      </div>

      <div class="col">
        <label>Numero batterie</label>
        <input id="num_${id}" value="1">
      </div>
    </div>
  </div>`;
}

function addLoad(){
  let id = Date.now();

  loads.push(id);

  document.getElementById("loads").innerHTML += `
  <div id="load_${id}">
    <div class="row">
      <div class="col">
        <label>Nome</label>
        <input id="lname_${id}" value="Utenza">
      </div>

      <div class="col">
        <label>Volt</label>
        <input id="lvolt_${id}" value="12">
      </div>

      <div class="col">
        <label>Watt</label>
        <input id="lw_${id}" value="100">
      </div>
    </div>
  </div>`;
}

function generate(){

  let inverter = parseInt(document.getElementById("inverterPower").value);
  let voltage = parseInt(document.getElementById("systemVoltage").value);

  let systemType = "basic";
  if(inverter > 3000) systemType = "advanced";

  let inverterType = "Phoenix";
  if(systemType === "advanced") inverterType = "MultiPlus";

  let result = `
  <b>Tipo impianto:</b> ${systemType}<br>
  <b>Inverter selezionato:</b> ${inverterType}<br><br>
  `;

  let totalAh = 0;

  batteries.forEach(id=>{
    let ah = parseInt(document.getElementById("ah_"+id).value);
    let num = parseInt(document.getElementById("num_"+id).value);

    totalAh += ah * num;
  });

  result += `<b>Capacità totale batterie:</b> ${totalAh} Ah<br>`;

  document.getElementById("result").innerHTML = result;

  drawSchema(inverterType, voltage);
}

function drawSchema(inverterType, voltage){

  let html = "";

  html += `<div class="node">Batterie ${voltage}V</div>`;
  html += ` → `;
  html += `<div class="node">${inverterType}</div>`;
  html += ` → `;
  html += `<div class="node">Carichi AC</div><br><br>`;

  if(loads.length){
    html += `<div class="node">Batterie</div> → <div class="node">DC-DC</div> → <div class="node">Carichi DC</div>`;
  }

  document.getElementById("schema").innerHTML = html;
}

</script>

</body>
</html>
