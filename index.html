<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Victron Configurator V11</title>

<style>
body {font-family: Arial; background:#0b2a4a; color:#fff; margin:0;}
.container {max-width:1000px; margin:auto; padding:20px;}
.card {background:#fff; color:#000; border-radius:12px; padding:15px; margin-bottom:15px;}
input, select {width:100%; padding:6px; margin:4px 0;}
button {padding:10px; background:#00a3e0; color:#fff; border:none; border-radius:8px; cursor:pointer;}
.hidden {display:none;}
</style>

</head>
<body>

<div class="container">

<h1>⚡ Configuratore Victron V11</h1>

<div class="card">
<h2>Dati</h2>
<input id="power" placeholder="Potenza inverter W" type="number">
<select id="voltage">
<option>12</option>
<option selected>24</option>
<option>48</option>
</select>
</div>

<div class="card">
<h2>Batterie</h2>
<button onclick="addBattery()">+ Banco</button>
<div id="batteries"></div>
</div>

<div class="card">
<h2>Fotovoltaico</h2>
<label><input type="checkbox" id="pvEnable" onchange="togglePV()"> Attivo</label>

<div id="pvBlock" class="hidden">
<input id="pvPower" placeholder="Potenza pannello">
<input id="pvVoc" placeholder="Voc pannello">
<input id="pvNum" placeholder="Numero pannelli" value="1">
</div>
</div>

<div class="card">
<button onclick="generate()">Genera Configurazione</button>
</div>

<div class="card">
<h2>Output</h2>
<div id="output">---</div>
</div>

</div>

<script>

// -------- FUNZIONI BASE --------

function get(id){ return document.getElementById(id).value }
function num(id){ return Number(get(id)) || 0 }

// -------- BATTERIE --------

function addBattery(){
  const div = document.createElement("div")
  div.innerHTML = `
    <input placeholder="Ah" class="ah">
    <input placeholder="Volt" class="volt" value="12">
  `
  document.getElementById("batteries").appendChild(div)
}

// -------- FV --------

function togglePV(){
  document.getElementById("pvBlock").classList.toggle("hidden")
}

// -------- GENERA --------

function generate(){

  let out = ""

  // batterie
  let bats = document.querySelectorAll("#batteries div")
  bats.forEach(b=>{
    let ah = b.querySelector(".ah").value
    let v = b.querySelector(".volt").value
    out += `🔋 ${v}V ${ah}Ah<br>`
  })

  // FV
  if(document.getElementById("pvEnable").checked){
    let p = num("pvPower")
    let voc = num("pvVoc")
    let n = num("pvNum")

    out += `☀️ FV ${p*n}W Voc ${voc}<br>`
  }

  // inverter
  let power = num("power")
  let volt = get("voltage")

  out += `<br>⚡ Inverter ${power}W ${volt}V`

  document.getElementById("output").innerHTML = out
}

</script>

</body>
</html>
